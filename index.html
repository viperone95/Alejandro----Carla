<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Abel ❤️ Carla</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{
  background:black;
  color:white;
  font-family:Arial;
  overflow:hidden;
  text-align:center;
}
#pantalla{
  position:fixed;
  width:100%;
  height:100%;
  display:flex;
  justify-content:center;
  align-items:center;
  flex-direction:column;
  padding:20px;
}
#texto{
  font-size:22px;
  min-height:60px;
  padding:0 20px;
  text-shadow:0 0 20px pink;
}
.fade{opacity:0;animation:fadeIn 2s forwards;}
@keyframes fadeIn{to{opacity:1;}}
#btn{
  margin-top:30px;
  padding:14px 30px;
  border-radius:25px;
  background:rgba(255,100,150,0.25);
  border:1.5px solid pink;
  cursor:pointer;
  display:none;
  color:white;
  font-size:17px;
  transition:all 0.3s;
}
#btn:hover{background:rgba(255,100,150,0.5);}
#foto{
  width:80%;
  max-width:320px;
  border-radius:20px;
  margin-top:20px;
  box-shadow:0 0 50px pink;
  display:none;
}
#final{
  margin-top:25px;
  display:none;
  font-size:17px;
  line-height:2;
  padding:0 25px;
  color:#ffccd5;
  text-shadow:0 0 10px rgba(255,100,130,0.5);
}
.corazon{
  position:fixed;
  animation:subir linear forwards;
  pointer-events:none;
}
@keyframes subir{
  from{transform:translateY(105vh);}
  to{transform:translateY(-10vh);opacity:0;}
}
#sc-player{
  position:fixed;
  left:-9999px;
  top:-9999px;
  width:1px;
  height:1px;
  border:none;
}
</style>
</head>
<body>

<iframe id="sc-player" src="" allow="autoplay"></iframe>

<div id="pantalla">
  <h2 id="texto"></h2>
  <button id="btn">Tócame 💖</button>
  <img id="foto" src="./foto.jpg" alt="Nuestra foto">
  <div id="final">
    Desde que llegaste… 💖<br>
    todo cambió.<br>
    Contigo encontré algo que no sabía que me faltaba…<br><br>
    Y si la vida me da otra oportunidad…<br>
    te elegiría mil veces más ❤️
  </div>
</div>

<script>
const texto = document.getElementById("texto");
const btn = document.getElementById("btn");
const foto = document.getElementById("foto");
const final = document.getElementById("final");
const player = document.getElementById("sc-player");

const SC_URL = "https://w.soundcloud.com/player/?url=https%3A//soundcloud.com/carlos-di-2/amame-el-gran-combo&auto_play=true&hide_related=true&show_comments=false&show_user=false&visual=false&color=%23ff5566";

const frases = [
  "A veces la vida cambia en un instante...",
  "A veces aparece alguien...",
  "y sin darte cuenta...",
  "lo cambia todo ✨",
  "Carla..."
];

let i = 0;
function mostrarFrases(){
  if(i < frases.length){
    texto.innerHTML = frases[i];
    texto.className = "fade";
    i++;
    setTimeout(()=>{ texto.className=""; setTimeout(mostrarFrases,1500); }, 2200);
  } else {
    texto.innerHTML = "Tengo algo para ti...";
    texto.className = "fade";
    setTimeout(()=>{ btn.style.display="block"; }, 1000);
  }
}
setTimeout(mostrarFrases, 800);

btn.onclick = ()=>{
  texto.style.display="none";
  btn.style.display="none";
  foto.style.display="block";
  final.style.display="block";
  /* Activar música poniendo el src con autoplay=true */
  player.src = SC_URL;
  corazones();
};

function corazones(){
  setInterval(()=>{
    const h = document.createElement("div");
    h.className = "corazon";
    h.innerHTML = ["❤️","💕","💖","💗","💓"][Math.floor(Math.random()*5)];
    h.style.left = Math.random()*95 + "vw";
    h.style.fontSize = (10 + Math.random()*22) + "px";
    const dur = 4 + Math.random()*3;
    h.style.animationDuration = dur + "s";
    document.body.appendChild(h);
    setTimeout(()=>h.remove(), dur*1000);
  }, 350);
}
</script>
</body>
</html>
